<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прогресс учеников | Архитектор учебных миров</title>
    <link href="https://fonts.googleapis.com/css2?family=Philosopher:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #0b0c1b 0%, #3a154d 50%, #1a3b68 100%);
            background-attachment: fixed;
            color: #ffffff; 
            margin: 0; 
            padding: 30px 20px; 
            min-height: 100vh;
            overflow-x: hidden; /* Чтобы звезды не создавали прокрутку вбок */
        }

        /* --- НОВЫЙ БЛОК: Стили для звезд и шлейфа --- */
        .star {
            position: fixed;
            background-color: #ffffff;
            border-radius: 50%;
            z-index: 0; /* Оставляем позади контента */
            pointer-events: none;
            animation: twinkle infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(0.8); }
            50% { opacity: 0.8; transform: scale(1.2); box-shadow: 0 0 10px rgba(255,255,255,0.8); }
        }

        .mouse-trail {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #ffe896; /* Золотистый цвет пыльцы */
            border-radius: 50%;
            pointer-events: none; /* Чтобы не мешала кликать */
            z-index: 9999;
            box-shadow: 0 0 10px #ffe896, 0 0 20px #d4af37;
            animation: fadeOutTrail 0.8s linear forwards;
        }

        @keyframes fadeOutTrail {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0); }
        }
        /* ------------------------------------------ */

        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
            position: relative; /* Чтобы контент был поверх звезд */
            z-index: 1;
        }

        h1 { 
            text-align: center; 
            font-family: 'Philosopher', sans-serif;
            font-size: 3.5em;
            margin-bottom: 0px;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(to bottom, #ffe896 0%, #d4af37 50%, #aa7700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.6));
        }

        .subtitle {
            text-align: center;
            font-family: 'Philosopher', sans-serif;
            font-size: 1.5em;
            color: #d1c4e9;
            margin-top: 5px;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.5);
        }

        .cards-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
        }

        .card { 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 15px; 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); 
            border-left: 6px solid #d4af37; 
            transition: transform 0.3s ease, box-shadow 0.3s ease; 
        }

        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 12px 40px rgba(0,0,0,0.5); 
            background: rgba(255, 255, 255, 0.12);
        }

        .avatar { 
            width: 60px; 
            height: 60px; 
            border-radius: 10px; 
            flex-shrink: 0; 
            margin-right: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #ffffff; 
            font-weight: bold; 
            font-size: 1.4em; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .info { flex-grow: 1; }
        .name { font-weight: bold; font-size: 1.1em; margin: 0 0 5px 0; color: #ffffff;}
        .tasks { font-size: 0.9em; color: #b3a0d1; margin: 0; }
        .checkmarks { font-size: 1.2em; text-align: right; margin-left: 10px; flex-shrink: 0; letter-spacing: 2px; filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.4));}
        .loading { text-align: center; color: #d1c4e9; font-size: 1.2em; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Архитектор</h1>
        <div class="subtitle">учебных миров ✨</div>
        <div id="loading" class="loading">Загружаем данные из портала... ⏳</div>
        <div id="cardsContainer" class="cards-grid"></div>
    </div>

    <script>
        const GOOGLE_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRN6lR23IvtyaNCPyuFnLdOo3yBqxK25GmB7R6cFeiyzfypkkMkifjVsw5-3wTp2fxLoKDIvTSMCXPP/pub?gid=0&single=true&output=csv';

        window.onload = function() {
            createBackgroundStars(); // Запускаем генерацию звезд

            fetch(GOOGLE_SHEET_URL)
                .then(response => response.text())
                .then(csvText => {
                    document.getElementById('loading').style.display = 'none'; 
                    processCSV(csvText);
                })
                .catch(error => {
                    document.getElementById('loading').innerHTML = '❌ Ошибка связи с порталом. Проверьте ссылку.';
                    console.error('Ошибка:', error);
                });
        };

        // --- НОВЫЕ ФУНКЦИИ: Звезды и шлейф мыши ---
        function createBackgroundStars() {
            const numStars = 70; // Количество звезд
            for (let i = 0; i < numStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                // Рандомизируем размер, положение и скорость мерцания
                const size = Math.random() * 3 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}vw`;
                star.style.top = `${Math.random() * 100}vh`;
                star.style.animationDuration = `${Math.random() * 4 + 2}s`;
                star.style.animationDelay = `${Math.random() * 5}s`;
                
                document.body.appendChild(star);
            }
        }

        document.addEventListener('mousemove', function(e) {
            // Создаем искру не на каждый пиксель, а с небольшой вероятностью для оптимизации
            if (Math.random() > 0.4) return; 

            const trail = document.createElement('div');
            trail.className = 'mouse-trail';
            
            // Смещаем пыльцу немного от центра курсора
            const offsetX = (Math.random() - 0.5) * 20;
            const offsetY = (Math.random() - 0.5) * 20;
            
            trail.style.left = `${e.clientX + offsetX}px`;
            trail.style.top = `${e.clientY + offsetY}px`;
            
            document.body.appendChild(trail);

            // Очищаем DOM: удаляем элемент через 800мс, когда закончится CSS-анимация fadeOutTrail
            setTimeout(() => {
                trail.remove();
            }, 800);
        });
        // -----------------------------------------

        function processCSV(csvText) {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = ''; 

            const lines = csvText.split(/\r?\n/);
            if (lines.length < 2) return; 

            let students = [];

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue; 

                const parts = lines[i].split(',');
                
                if (parts.length > 0) {
                    const name = parts[0].trim();
                    if (!name) continue; 

                    let tasksCount = 0;
                    for (let j = 1; j < parts.length; j++) {
                        if (parts[j].trim() !== '') {
                            tasksCount++;
                        }
                    }

                    students.push({ name: name, tasksCount: tasksCount });
                }
            }

            students.sort((a, b) => a.name.localeCompare(b.name, 'ru'));

            students.forEach(student => {
                createCard(student.name, student.tasksCount, container);
            });
        }

        function getInitials(name) {
            const words = name.split(' ').filter(w => w.length > 0);
            if (words.length === 0) return '👤';
            if (words.length === 1) return words[0].substring(0, 2).toUpperCase();
            return (words[0][0] + words[1][0]).toUpperCase();
        }

        function getColor(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            const hue = Math.abs(hash % 360);
            return `hsl(${hue}, 70%, 50%)`;
        }

        function createCard(name, tasksCount, container) {
            const checkmarksCount = tasksCount;
            const checkmarksHtml = '✅'.repeat(checkmarksCount);
            
            const initials = getInitials(name);
            const bgColor = getColor(name);
            const avatarHtml = `<div class="avatar" style="background-color: ${bgColor};">${initials}</div>`;

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                ${avatarHtml}
                <div class="info">
                    <p class="name">${name}</p>
                    <p class="tasks">${tasksCount} выполненных заданий</p>
                </div>
                <div class="checkmarks">${checkmarksHtml}</div>
            `;
            container.appendChild(card);
        }
    </script>
</body>
</html>
